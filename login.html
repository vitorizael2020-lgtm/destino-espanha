<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18239034284"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'AW-18239034284');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesse sua área exclusiva na Destino Espanha. Acompanhe seu processo de imigração.">
    <title>Login | Destino Espanha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/portal.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <img src="logo.jpg" alt="Logo Destino Espanha" style="height: 60px; border-radius: 50%; object-fit: cover;">
                <div class="logo-text" style="display: flex; align-items: center; gap: 4px;">Destino<span>Espanha</span></div>
                <div class="logo-sub">Portal do Cliente</div>
            </div>

            <!-- Login Form -->
            <div id="login-form-section">
                <h2 class="login-title">Acesse sua conta</h2>

                <!-- Alert -->
                <div class="alert alert-error" id="login-alert"></div>
                <div class="alert alert-success" id="login-success"></div>

                <form id="login-form" autocomplete="on">
                    <div class="form-group">
                        <label for="login-email">E-mail</label>
                        <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email" autocapitalize="none" autocorrect="off">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" autocapitalize="none" autocorrect="off">
                    </div>
                    <button type="submit" class="btn-login" id="btn-login">
                        <span class="btn-text">Entrar</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <div class="login-forgot">
                    <a href="#" id="forgot-link">Esqueci minha senha</a>
                </div>
            </div>

            <!-- Reset Password Form (hidden by default) -->
            <div id="reset-form-section" style="display: none;">
                <h2 class="login-title">Redefinir Senha</h2>

                <div class="alert alert-error" id="reset-alert"></div>
                <div class="alert alert-success" id="reset-success"></div>

                <form id="reset-form">
                    <div class="form-group">
                        <label for="reset-email">E-mail da conta</label>
                        <input type="email" id="reset-email" placeholder="seu@email.com" required>
                    </div>
                    <button type="submit" class="btn-login" id="btn-reset">
                        <span class="btn-text">Enviar Link de Redefinição</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <div class="login-forgot">
                    <a href="#" id="back-to-login">← Voltar ao login</a>
                </div>
            </div>

            <!-- Back to site -->
            <div class="login-back">
                <a href="index.html">← Voltar ao site</a>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/supabase-config.js?v=2.2"></script>
    <script src="shared/auth.js?v=2.3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if Supabase initialized correctly (e.g. AdBlock / Brave Shield)
            if (typeof supabase === 'undefined' || !supabase || !supabase.auth) {
                const loginAlert = document.getElementById('login-alert');
                if (loginAlert) {
                    loginAlert.innerHTML = '⚠️ <strong>Erro de conexão:</strong> Não foi possível conectar ao banco de dados. Se você usa bloqueador de anúncios (AdBlock) ou navegador Brave, desative a proteção/escudo para este site para conseguir logar.';
                    loginAlert.classList.add('show');
                }
                const loginBtn = document.getElementById('btn-login');
                if (loginBtn) loginBtn.disabled = true;
                return;
            }

            // Check if already logged in
            Auth.init().then(userData => {
                if (userData) {
                    Auth.redirectByRole(userData.role);
                }
            }).catch(e => console.log("User not logged in or profile missing"));

            // === LOGIN FORM ===
            const loginForm = document.getElementById('login-form');
            const loginBtn = document.getElementById('btn-login');
            const loginAlert = document.getElementById('login-alert');
            const loginSuccess = document.getElementById('login-success');

            // Check if redirected here because user is blocked (from init())
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('bloqueado') === '1') {
                showBlockedCard();
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                loginAlert.classList.remove('show');
                loginSuccess.classList.remove('show');
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;

                const result = await Auth.login(email, password);

                if (!result.success) {
                    if (result.error === '__BLOQUEADO__') {
                        showBlockedCard();
                        return;
                    }
                    loginAlert.textContent = result.error;
                    loginAlert.classList.add('show');
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
                // If success, the Auth.login already redirects
            });

            function showBlockedCard() {
                const loginSection = document.getElementById('login-form-section');
                const resetSection = document.getElementById('reset-form-section');
                if (loginSection) loginSection.style.display = 'none';
                if (resetSection) resetSection.style.display = 'none';

                // Create or show blocked card
                let blockedCard = document.getElementById('blocked-card');
                if (!blockedCard) {
                    blockedCard = document.createElement('div');
                    blockedCard.id = 'blocked-card';
                    blockedCard.innerHTML = `
                        <div style="text-align: center; padding: 20px 0;">
                            <div style="font-size: 3rem; margin-bottom: 12px;">🔒</div>
                            <h2 style="font-size: 1.2rem; font-weight: 700; color: #c0392b; margin-bottom: 8px;">Acesso Temporariamente Indisponível</h2>
                            <p style="font-size: 0.9rem; color: #666; margin-bottom: 24px; line-height: 1.5;">
                                Seu acesso ao portal está suspenso.<br>
                                Entre em contato com nosso suporte para mais informações.
                            </p>
                            <a href="https://wa.me/34642874197?text=Ol%C3%A1!%20N%C3%A3o%20estou%20conseguindo%20acessar%20meu%20portal%20do%20cliente."
                               target="_blank"
                               style="display: inline-flex; align-items: center; gap: 8px; background: #25D366; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: background 0.2s;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.612.638l4.648-1.422A11.944 11.944 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.239 0-4.332-.726-6.024-1.955a.5.5 0 00-.404-.078l-3.252.995.93-3.135a.5.5 0 00-.064-.427A9.946 9.946 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
                                Falar no WhatsApp
                            </a>
                        </div>
                    `;
                    const loginCard = document.querySelector('.login-card');
                    if (loginCard) loginCard.appendChild(blockedCard);
                }
                blockedCard.style.display = 'block';
            }

            // === FORGOT PASSWORD ===
            const forgotLink = document.getElementById('forgot-link');
            const backToLogin = document.getElementById('back-to-login');
            const loginSection = document.getElementById('login-form-section');
            const resetSection = document.getElementById('reset-form-section');

            forgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                loginSection.style.display = 'none';
                resetSection.style.display = 'block';
                // Pre-fill email if already typed
                const email = document.getElementById('login-email').value;
                if (email) document.getElementById('reset-email').value = email;
            });

            backToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                resetSection.style.display = 'none';
                loginSection.style.display = 'block';
            });

            // === RESET FORM ===
            const resetForm = document.getElementById('reset-form');
            const resetBtn = document.getElementById('btn-reset');
            const resetAlert = document.getElementById('reset-alert');
            const resetSuccess = document.getElementById('reset-success');

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                resetAlert.classList.remove('show');
                resetSuccess.classList.remove('show');
                resetBtn.classList.add('loading');
                resetBtn.disabled = true;

                const email = document.getElementById('reset-email').value.trim();
                const result = await Auth.resetPassword(email);

                if (result.success) {
                    resetSuccess.textContent = result.message;
                    resetSuccess.classList.add('show');
                } else {
                    resetAlert.textContent = result.error;
                    resetAlert.classList.add('show');
                }

                resetBtn.classList.remove('loading');
                resetBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
