<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesse sua área exclusiva na Destino Espanha. Acompanhe seu processo de imigração.">
    <title>Login | Destino Espanha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/portal.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <img src="logo.jpg" alt="Logo Destino Espanha" style="height: 60px; border-radius: 50%; object-fit: cover;">
                <div class="logo-text" style="display: flex; align-items: center; gap: 4px;">Destino<span>Espanha</span></div>
                <div class="logo-sub">Portal do Cliente</div>
            </div>

            <!-- Login Form -->
            <div id="login-form-section">
                <h2 class="login-title">Acesse sua conta</h2>

                <!-- Alert -->
                <div class="alert alert-error" id="login-alert"></div>
                <div class="alert alert-success" id="login-success"></div>

                <form id="login-form" autocomplete="on">
                    <div class="form-group">
                        <label for="login-email">E-mail</label>
                        <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Senha</label>
                        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-login" id="btn-login">
                        <span class="btn-text">Entrar</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <div class="login-forgot">
                    <a href="#" id="forgot-link">Esqueci minha senha</a>
                </div>
            </div>

            <!-- Reset Password Form (hidden by default) -->
            <div id="reset-form-section" style="display: none;">
                <h2 class="login-title">Redefinir Senha</h2>

                <div class="alert alert-error" id="reset-alert"></div>
                <div class="alert alert-success" id="reset-success"></div>

                <form id="reset-form">
                    <div class="form-group">
                        <label for="reset-email">E-mail da conta</label>
                        <input type="email" id="reset-email" placeholder="seu@email.com" required>
                    </div>
                    <button type="submit" class="btn-login" id="btn-reset">
                        <span class="btn-text">Enviar Link de Redefinição</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <div class="login-forgot">
                    <a href="#" id="back-to-login">← Voltar ao login</a>
                </div>
            </div>

            <!-- Back to site -->
            <div class="login-back">
                <a href="index.html">← Voltar ao site</a>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/supabase-config.js"></script>
    <script src="shared/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            Auth.init().then(userData => {
                if (userData) {
                    Auth.redirectByRole(userData.role);
                }
            }).catch(e => console.log("User not logged in or profile missing"));

            // === LOGIN FORM ===
            const loginForm = document.getElementById('login-form');
            const loginBtn = document.getElementById('btn-login');
            const loginAlert = document.getElementById('login-alert');
            const loginSuccess = document.getElementById('login-success');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                loginAlert.classList.remove('show');
                loginSuccess.classList.remove('show');
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;

                const result = await Auth.login(email, password);

                if (!result.success) {
                    loginAlert.textContent = result.error;
                    loginAlert.classList.add('show');
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
                // If success, the Auth.login already redirects
            });

            // === FORGOT PASSWORD ===
            const forgotLink = document.getElementById('forgot-link');
            const backToLogin = document.getElementById('back-to-login');
            const loginSection = document.getElementById('login-form-section');
            const resetSection = document.getElementById('reset-form-section');

            forgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                loginSection.style.display = 'none';
                resetSection.style.display = 'block';
                // Pre-fill email if already typed
                const email = document.getElementById('login-email').value;
                if (email) document.getElementById('reset-email').value = email;
            });

            backToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                resetSection.style.display = 'none';
                loginSection.style.display = 'block';
            });

            // === RESET FORM ===
            const resetForm = document.getElementById('reset-form');
            const resetBtn = document.getElementById('btn-reset');
            const resetAlert = document.getElementById('reset-alert');
            const resetSuccess = document.getElementById('reset-success');

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                resetAlert.classList.remove('show');
                resetSuccess.classList.remove('show');
                resetBtn.classList.add('loading');
                resetBtn.disabled = true;

                const email = document.getElementById('reset-email').value.trim();
                const result = await Auth.resetPassword(email);

                if (result.success) {
                    resetSuccess.textContent = result.message;
                    resetSuccess.classList.add('show');
                } else {
                    resetAlert.textContent = result.error;
                    resetAlert.classList.add('show');
                }

                resetBtn.classList.remove('loading');
                resetBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
